$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/auth/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "email": "user@example.com",
        "password": "wrongpassword"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "data": null,
        "meta": {},
        "errors": [
          {
            "code": "INVALID_CREDENTIALS",
            "message": "Invalid email or password",
            "field": null
          }
        ]
      }
order: 4000
