$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/users/me/password"
  method: PATCH
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "currentPassword": "OldPass1!",
        "newPassword": "short"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "data": null,
        "meta": {},
        "errors": [
          {
            "code": "VALIDATION_ERROR",
            "message": "newPassword: size must be between 8 and 2147483647",
            "field": "newPassword"
          }
        ]
      }
order: 2000
