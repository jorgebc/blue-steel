$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/auth/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "email": "not-an-email",
        "password": "Password1!"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "data": null,
        "meta": {},
        "errors": [
          {
            "code": "VALIDATION_ERROR",
            "message": "must be a well-formed email address",
            "field": "email"
          }
        ]
      }
order: 3000
