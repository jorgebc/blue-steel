$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/auth/refresh"
  method: POST
  headers:
    Cookie: "refresh_token=<expired-token>"
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "data": null,
        "meta": {},
        "errors": [
          {
            "code": "REFRESH_TOKEN_EXPIRED",
            "message": "Refresh token has expired",
            "field": null
          }
        ]
      }
order: 3000
