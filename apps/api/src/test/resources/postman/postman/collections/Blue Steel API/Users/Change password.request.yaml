$kind: http-request
description: |-
  Changes the authenticated user's password and clears the `forcePasswordChange` flag.

  - **Auth:** Bearer token required
  - **200 OK** — password updated
  - **400** — `newPassword` too short (min 8 chars) or fields blank
  - **401** — unauthenticated
  - **422** — `currentPassword` does not match stored hash
url: "{{baseUrl}}/api/v1/users/me/password"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "currentPassword": "OldPass1!",
      "newPassword": "NewPass1!"
    }
examples: ./.resources/Change password.resources/examples
order: 2000
