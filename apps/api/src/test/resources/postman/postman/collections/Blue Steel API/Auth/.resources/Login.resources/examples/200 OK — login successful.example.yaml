$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/auth/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "email": "admin@example.com",
        "password": "Admin!Password123"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
    Set-Cookie: "refresh_token=<raw-token>; HttpOnly; Secure; SameSite=Strict; Path=/api/v1/auth; Max-Age=2592000"
  body:
    type: json
    content: |-
      {
        "data": {
          "accessToken": "<jwt>",
          "forcePasswordChange": false
        },
        "meta": {},
        "errors": []
      }
order: 1000
