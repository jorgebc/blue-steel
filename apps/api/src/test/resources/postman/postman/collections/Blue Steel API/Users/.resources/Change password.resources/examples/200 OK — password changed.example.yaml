$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/users/me/password"
  method: PATCH
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "currentPassword": "OldPass1!",
        "newPassword": "NewPass1!"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "data": null,
        "meta": {},
        "errors": []
      }
order: 1000
