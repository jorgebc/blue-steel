$kind: http-request
description: |-
  Revokes the entire refresh token family and clears the cookie.

  - **Auth:** Bearer token recommended (public route — logout still completes if token is absent)
  - **200 OK** — family revoked; `Set-Cookie` clears the refresh_token cookie (Max-Age=0)
url: "{{baseUrl}}/api/v1/auth/logout"
method: POST
headers:
  Accept: application/json
examples: ./.resources/Logout.resources/examples
order: 3000
