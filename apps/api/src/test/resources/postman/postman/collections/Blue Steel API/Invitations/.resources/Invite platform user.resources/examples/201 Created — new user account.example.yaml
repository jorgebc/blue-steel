$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/invitations"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "email": "newuser@example.com"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "data": {
          "email": "newuser@example.com",
          "status": "created"
        },
        "meta": {},
        "errors": []
      }
order: 1000
