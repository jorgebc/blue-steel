server.port=8080

# ── Error responses ───────────────────────────────────────────────────────────
# Defence in depth: never leak stack traces, exception types, or raw messages in error
# responses. GlobalExceptionHandler already returns the ERR-01 envelope; these pin the
# fallback default-error path too.
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false
server.error.include-binding-errors=never

# ── Profile groups ────────────────────────────────────────────────────────────
# Activating 'prod' also activates 'email-real', switching EmailPort from the
# console mock to the real Brevo HTTP adapter (D-075). Local/CI/test keep the mock.
spring.profiles.group.prod=email-real

# ── Datasource ────────────────────────────────────────────────────────────────
# DATABASE_URL must be a JDBC URL: jdbc:postgresql://<host>/<db>?sslmode=require
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Liquibase ─────────────────────────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
# embeddingDimension: 1536 for Gemini gemini-embedding-001 with outputDimensionality=1536 (llm-real),
#   1024 for Ollama bge-m3 (llm-ollama) (D-088, D-093)
spring.liquibase.parameters.embeddingDimension=${EMBEDDING_DIMENSION:1536}

# ── Spring AI — Google GenAI embedding connection key ─────────────────────────
# The Gemini embedding auto-config uses its own 'spring.ai.google.genai.embedding'
# prefix (distinct from the chat 'spring.ai.google.genai' prefix). Without a key it
# falls into Vertex-AI mode and fails startup. Real key is injected via GEMINI_API_KEY
# under llm-real/prod; the placeholder keeps mock/test contexts booting (bean is built
# but never invoked there). (D-093)
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY:placeholder}

# ── Ingestion ─────────────────────────────────────────────────────────────────
blue-steel.ingestion.max-tokens=${BLUE_STEEL_INGESTION_MAX_TOKENS:8000}
blue-steel.ingestion.processing-timeout-minutes=${BLUE_STEEL_INGESTION_PROCESSING_TIMEOUT_MINUTES:10}
blue-steel.ingestion.processing-timeout-check-interval-ms=${BLUE_STEEL_INGESTION_PROCESSING_TIMEOUT_CHECK_INTERVAL_MS:300000}

# ── Proposals (D-105) ─────────────────────────────────────────────────────────
# Proposal time-to-live in days; expires_at is stamped at creation as created_at + ttl-days.
# The expiry sweep (open/cosigned → expired) ships with a later Phase 5 sub-task.
blue-steel.proposal.ttl-days=${PROPOSAL_TTL_DAYS:30}

# ── LLM token budgets (D-034) ─────────────────────────────────────────────────
blue-steel.llm.extraction-max-tokens=${BLUE_STEEL_LLM_EXTRACTION_MAX_TOKENS:4000}
blue-steel.llm.resolution-max-tokens=${BLUE_STEEL_LLM_RESOLUTION_MAX_TOKENS:2000}
blue-steel.llm.conflict-max-tokens=${BLUE_STEEL_LLM_CONFLICT_MAX_TOKENS:3000}
# Query Mode answering prompt budget (instructions + retrieved snapshots + question). The prompt is
# already bounded by query.retrieval.top-n; raise via env var when more memory is available.
blue-steel.llm.query-answering-max-tokens=${BLUE_STEEL_LLM_QUERY_ANSWERING_MAX_TOKENS:6000}

# ── Conflict detection context (D-033) ───────────────────────────────────────
blue-steel.conflict.context-top-n=${BLUE_STEEL_CONFLICT_CONTEXT_TOP_N:5}

# ── Entity resolution thresholds (D-041) ──────────────────────────────────────
blue-steel.resolution.similarity-floor=${BLUE_STEEL_RESOLUTION_SIMILARITY_FLOOR:0.75}
blue-steel.resolution.top-n=${BLUE_STEEL_RESOLUTION_TOP_N:3}

# ── Query Mode retrieval (D-034) ──────────────────────────────────────────────
# top-N committed entity snapshots loaded into memory per query. Primary heap knob
# for Query Mode (heap ≈ top-N × snapshot size) — keep low on the Render free tier;
# raise via env var (no redeploy/reimplementation) when more memory is available.
query.retrieval.top-n=${QUERY_RETRIEVAL_TOP_N:8}

# ── Query Mode execution (D-052) ──────────────────────────────────────────────
# Synchronous query deadline; past it the request returns 504 QUERY_TIMEOUT. The cancelled LLM
# call is not interrupted — it completes on its pool thread and still records its cost.
query.timeout-seconds=${QUERY_TIMEOUT_SECONDS:20}
# Dedicated bounded pool for the query LLM call: keeps it off the JVM-wide commonPool and away
# from the embedding executor. Pool + queue also bound the worst-case cost-cap overshoot;
# raise via env var when more capacity is available.
query.executor.pool-size=${QUERY_EXECUTOR_POOL_SIZE:2}
query.executor.queue-capacity=${QUERY_EXECUTOR_QUEUE_CAPACITY:20}

# ── Query Mode app-level safeguards (D-096) ───────────────────────────────────
# Per-(user, campaign) sliding-window request rate limit. Bounds runaway/abusive query cost and
# protects availability; raise via env var when more capacity is available.
query.rate-limit.max-requests=${QUERY_RATE_LIMIT_MAX_REQUESTS:10}
query.rate-limit.window-seconds=${QUERY_RATE_LIMIT_WINDOW_SECONDS:60}
# Heap bound for the limiter's (user, campaign) key map: past this size, every check also prunes
# keys whose window has fully expired. Raise via env var when more memory is available.
query.rate-limit.max-tracked-keys=${QUERY_RATE_LIMIT_MAX_TRACKED_KEYS:1000}
# Daily LLM spend cap (USD, all stages, in-memory tally, resets at UTC midnight). Once reached,
# further queries are blocked with 503 QUERY_COST_CAP. Conservative default for the free tier.
query.cost-cap.daily-usd=${QUERY_COST_CAP_DAILY_USD:1.00}
# Per-campaign Q&A log retention (D-058). The adapter prunes each campaign's log to this many
# newest rows on every write, bounding DB growth. The read path is offset/limit paged, so heap is
# bounded by page size, not this value — raise via env var when more storage is available.
query.history.max-per-campaign=${QUERY_HISTORY_MAX_PER_CAMPAIGN:500}

# ── Campaign export (D-112) ───────────────────────────────────────────────────
# Export is the one "whole campaign at once" path; the per-version full JSONB snapshot is the heap
# multiplier. A cheap COUNT precheck rejects campaigns over this entity cap with 422
# EXPORT_TOO_LARGE before any rows load — raise from the Render dashboard when more heap is available.
campaign.export.max-entities=${CAMPAIGN_EXPORT_MAX_ENTITIES:2000}
# JDBC fetch size for the bulk export reads so the driver streams rows instead of buffering the
# whole result set client-side.
campaign.export.fetch-size=${CAMPAIGN_EXPORT_FETCH_SIZE:200}

# ── JWT (D-059, D-060) ────────────────────────────────────────────────────────
# Must be at least 32 bytes; validated at startup by JwtTokenService.
jwt.secret=${JWT_SECRET}

# ── Auth endpoint rate limiting ───────────────────────────────────────────────
# Per-client-IP sliding-window request limit on /auth/login and /auth/refresh, to blunt
# brute-force / credential-stuffing. Best-effort (IP from X-Forwarded-For, per-instance);
# raise via env var when more capacity is available.
auth.rate-limit.max-requests=${AUTH_RATE_LIMIT_MAX_REQUESTS:10}
auth.rate-limit.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
# Heap bound for the limiter's IP key map: past this size, every check also prunes keys
# whose window has fully expired.
auth.rate-limit.max-tracked-keys=${AUTH_RATE_LIMIT_MAX_TRACKED_KEYS:1000}

# ── Admin bootstrap (D-073) ───────────────────────────────────────────────────
# Required — missing values will fail startup with a clear error.
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

# ── CORS ──────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins. Empty = block all cross-origin requests.
# Production: set CORS_ALLOWED_ORIGIN to the Vercel frontend URL.
# Local dev: overridden by application-local.properties.
cors.allowed-origins=${CORS_ALLOWED_ORIGIN:}
