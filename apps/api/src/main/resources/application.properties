server.port=8080

# DB/JPA/Liquibase autoconfiguration disabled until persistence adapters are implemented.
# Remove these excludes when wiring the persistence layer.
spring.autoconfigure.exclude=\
  org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,\
  org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,\
  org.springframework.boot.data.jpa.autoconfigure.JpaRepositoriesAutoConfiguration,\
  org.springframework.boot.liquibase.autoconfigure.LiquibaseAutoConfiguration

blue-steel.ingestion.processing-timeout-minutes=${BLUE_STEEL_INGESTION_PROCESSING_TIMEOUT_MINUTES:10}
