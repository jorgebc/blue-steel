server.port=8080

# ── Profile groups ────────────────────────────────────────────────────────────
# Activating 'prod' also activates 'email-real', switching EmailPort from the
# console mock to the real Resend adapter (D-075). Local/CI/test keep the mock.
spring.profiles.group.prod=email-real

# ── Datasource ────────────────────────────────────────────────────────────────
# DATABASE_URL must be a JDBC URL: jdbc:postgresql://<host>/<db>?sslmode=require
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Liquibase ─────────────────────────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
# embeddingDimension: 1536 for Gemini gemini-embedding-001 with outputDimensionality=1536 (llm-real),
#   1024 for Ollama bge-m3 (llm-ollama) (D-088, D-093)
spring.liquibase.parameters.embeddingDimension=${EMBEDDING_DIMENSION:1536}

# ── Ingestion ─────────────────────────────────────────────────────────────────
blue-steel.ingestion.max-tokens=${BLUE_STEEL_INGESTION_MAX_TOKENS:8000}
blue-steel.ingestion.processing-timeout-minutes=${BLUE_STEEL_INGESTION_PROCESSING_TIMEOUT_MINUTES:10}
blue-steel.ingestion.processing-timeout-check-interval-ms=${BLUE_STEEL_INGESTION_PROCESSING_TIMEOUT_CHECK_INTERVAL_MS:300000}

# ── LLM token budgets (D-034) ─────────────────────────────────────────────────
blue-steel.llm.extraction-max-tokens=${BLUE_STEEL_LLM_EXTRACTION_MAX_TOKENS:4000}
blue-steel.llm.resolution-max-tokens=${BLUE_STEEL_LLM_RESOLUTION_MAX_TOKENS:2000}
blue-steel.llm.conflict-max-tokens=${BLUE_STEEL_LLM_CONFLICT_MAX_TOKENS:3000}

# ── Conflict detection context (D-033) ───────────────────────────────────────
blue-steel.conflict.context-top-n=${BLUE_STEEL_CONFLICT_CONTEXT_TOP_N:5}

# ── Entity resolution thresholds (D-041) ──────────────────────────────────────
blue-steel.resolution.similarity-floor=${BLUE_STEEL_RESOLUTION_SIMILARITY_FLOOR:0.75}
blue-steel.resolution.top-n=${BLUE_STEEL_RESOLUTION_TOP_N:3}

# ── JWT (D-059, D-060) ────────────────────────────────────────────────────────
# Must be at least 32 bytes; validated at startup by JwtTokenService.
jwt.secret=${JWT_SECRET}

# ── Admin bootstrap (D-073) ───────────────────────────────────────────────────
# Required — missing values will fail startup with a clear error.
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

# ── CORS ──────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins. Empty = block all cross-origin requests.
# Production: set CORS_ALLOWED_ORIGIN to the Vercel frontend URL.
# Local dev: overridden by application-local.properties.
cors.allowed-origins=${CORS_ALLOWED_ORIGIN:}
