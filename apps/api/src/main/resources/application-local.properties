# ── Local development profile ────────────────────────────────────────────────
# Activate with: -Dspring-boot.run.profiles=local (or SPRING_PROFILES_ACTIVE=local)
# Requires: docker compose up -d (starts pgvector/pgvector:pg16 on localhost:5432)
# No real external services needed — Spring AI uses placeholder keys;
# mock LLM adapters (profile: local) intercept all AI calls at zero cost.

spring.ai.anthropic.api-key=placeholder
spring.ai.openai.api-key=placeholder

# ── JWT (local dev only — 64 chars satisfies the 32-byte minimum) ────────────
JWT_SECRET=local-dev-jwt-secret-local-dev-jwt-secret-local-dev-jwt-secret!

# ── Admin bootstrap (local dev only) ─────────────────────────────────────────
admin.email=admin@local.dev
admin.password=Admin!Local123456

# ── Local datasource (docker-compose postgres) ────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/bluesteel
spring.datasource.username=bluesteel
spring.datasource.password=bluesteel
