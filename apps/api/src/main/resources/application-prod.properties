# ── Production profile — Render free tier web service ────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=prod (set in Render dashboard)
#
# Required environment variables in the Render dashboard (Service → Environment):
#
#   GEMINI_API_KEY         Google AI Studio key — Gemini chat + embeddings (D-093)
#   DATABASE_URL           Neon PostgreSQL JDBC URL
#                          e.g. jdbc:postgresql://<host>/<db>?sslmode=require
#   DB_USERNAME            Neon database user
#   DB_PASSWORD            Neon database password
#   JWT_SECRET             HS256 symmetric secret — minimum 32 bytes
#   GMAIL_APP_PASSWORD     Google App Password (NOT the account password; requires
#                          2-Step Verification). Sender + SMTP login = ADMIN_EMAIL.
#   CORS_ALLOWED_ORIGIN    Frontend origin allowed by CORS
#                          e.g. https://bluesteel.vercel.app

# ── Server ───────────────────────────────────────────────────────────────────
# Render injects PORT; fall back to 8080 for other environments
server.port=${PORT:8080}

# ── Spring AI — Google GenAI / Gemini (chat + embeddings, single key, D-093) ──
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=${GEMINI_CHAT_MODEL:gemini-2.5-flash}
spring.ai.google.genai.embedding.options.model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
# Truncate Gemini output to 1536 dims at API level — within pgvector IVFFlat/HNSW limit (D-093)
spring.ai.google.genai.embedding.options.output-dimensionality=1536

# ── Datasource (Neon PostgreSQL) ─────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Liquibase ─────────────────────────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
# Must match spring.ai.google.genai.embedding.options.output-dimensionality above (D-088, D-093)
spring.liquibase.parameters.embeddingDimension=${EMBEDDING_DIMENSION:1536}

# ── Auth ─────────────────────────────────────────────────────────────────────
# Must match the key injected by JwtTokenService and JwtAuthenticationFilter (@Value("${jwt.secret}"))
jwt.secret=${JWT_SECRET}

# ── Email (Brevo transactional API) ──────────────────────────────────────────
# The prod profile activates the 'email-real' profile (see application.properties),
# which switches EmailPort from the console mock to the Brevo HTTP adapter (D-075).
# Sender address (admin.email below) must be verified in the Brevo dashboard
# under Senders & IP → Senders. BREVO_API_KEY: Brevo dashboard → SMTP & API → API Keys.
blue-steel.email.brevo.api-key=${BREVO_API_KEY}

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGIN}
