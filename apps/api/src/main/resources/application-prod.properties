# ── Production profile — Oracle Cloud Always Free ARM VM ─────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=prod (set in Docker container at deploy time)
#
# Required environment variables on the Oracle VM (~/blue-steel.env):
#
#   ANTHROPIC_API_KEY      Claude text generation (Anthropic)
#   OPENAI_API_KEY         text-embedding-3-small (OpenAI)
#   DATABASE_URL           Neon PostgreSQL JDBC URL
#                          e.g. jdbc:postgresql://<host>/<db>?sslmode=require
#   DB_USERNAME            Neon database user
#   DB_PASSWORD            Neon database password
#   JWT_SECRET             HS256 symmetric secret — minimum 32 bytes
#   EMAIL_API_KEY          Transactional email (Resend)
#   VITE_API_BASE_URL      Frontend origin allowed by CORS
#                          e.g. https://app.bluesteel.io

# ── Spring AI ────────────────────────────────────────────────────────────────
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.openai.api-key=${OPENAI_API_KEY}

# ── Datasource (Neon PostgreSQL) ─────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Liquibase ─────────────────────────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ── Auth ─────────────────────────────────────────────────────────────────────
blue-steel.jwt.secret=${JWT_SECRET}

# ── Email ────────────────────────────────────────────────────────────────────
blue-steel.email.api-key=${EMAIL_API_KEY}

# ── CORS ─────────────────────────────────────────────────────────────────────
VITE_API_BASE_URL=${VITE_API_BASE_URL}
