# ── Local Ollama provider (D-088) ─────────────────────────────────────────────
# Layered on local, e.g. -Dspring-boot.run.profiles=local,llm-ollama
# Requires Ollama running at OLLAMA_BASE_URL (default: http://localhost:11434).
# Chat: OLLAMA_CHAT_MODEL (default: qwen2.5:7b)
# Embeddings: OLLAMA_EMBEDDING_MODEL (default: bge-m3, 1024 dims)
# Switching from llm-real: docker compose down -v && docker compose up -d (D-088)

spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_CHAT_MODEL:qwen2.5:7b}
spring.ai.ollama.embedding.options.model=${OLLAMA_EMBEDDING_MODEL:bge-m3}

# Disable Gemini auto-configuration — prevents ChatModel/EmbeddingModel bean ambiguity
# when both providers are on the classpath (mirrors the Ollama exclude in llm-real).
spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration

# pgvector column dimension — must match the active embedding model.
# bge-m3 produces 1024-dim vectors; Gemini gemini-embedding-001 uses 1536 (D-088, D-093).
spring.liquibase.parameters.embeddingDimension=${EMBEDDING_DIMENSION:1024}
