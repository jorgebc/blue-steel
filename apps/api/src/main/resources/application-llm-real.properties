# ── Real cloud LLM provider: Google AI Studio / Gemini (D-093) ───────────────
# Layered on another profile, e.g. -Dspring-boot.run.profiles=local,llm-real
# Requires a real GEMINI_API_KEY (Google AI Studio). Overrides the local placeholder.
# Chat + embeddings are served by the single google-genai starter under one key.

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=${GEMINI_CHAT_MODEL:gemini-2.5-flash}
spring.ai.google.genai.embedding.options.model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}

# pgvector column dimension for gemini-embedding-001 (native 3072). Must match the
# value used when entity_embeddings was created; switching models/dimension requires
# recreating the vector column (D-088, D-093).
EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:3072}
