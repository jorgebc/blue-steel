# ── Real cloud LLM provider: Google AI Studio / Gemini (D-093) ───────────────
# Layered on another profile, e.g. -Dspring-boot.run.profiles=local,llm-real
# Requires a real GEMINI_API_KEY (Google AI Studio). Overrides the local placeholder.
# Chat + embeddings are served by the single google-genai starter under one key.

# Disable Ollama auto-configuration — prevents ChatModel/EmbeddingModel bean ambiguity
# when both starters are on the classpath (mirrors the api-key blanking in llm-ollama).
spring.autoconfigure.exclude=org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration,org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=${GEMINI_CHAT_MODEL:gemini-2.5-flash}
spring.ai.google.genai.embedding.text.options.model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
# Reduce output to 1536 dims — stays within pgvector IVFFlat/HNSW 2000-dim limit while
# preserving quality. gemini-embedding-001 natively produces 3072; 'dimensions' requests
# truncation at the API level (D-093).
spring.ai.google.genai.embedding.text.options.dimensions=1536

# pgvector column dimension — must match the embedding 'dimensions' above. Switching requires
# recreating the vector column (D-088, D-093).
spring.liquibase.parameters.embeddingDimension=${EMBEDDING_DIMENSION:1536}
