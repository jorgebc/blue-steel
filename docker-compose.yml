# Local development infrastructure only.
# Starts PostgreSQL 16 with the pgvector extension pre-installed.
# Production database is on Neon (D-047) — do not use this file in production.
#
# Usage:
#   docker compose up -d      # Start in background
#   docker compose down       # Stop and remove containers (data persisted in volume)
#   docker compose down -v    # Stop and remove containers + volumes (wipes data)

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bluesteel
      POSTGRES_USER: bluesteel
      POSTGRES_PASSWORD: bluesteel
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluesteel -d bluesteel"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
