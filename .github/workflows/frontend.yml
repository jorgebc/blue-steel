name: Frontend CI

# Triggered only when frontend files change (D-048)
# Deployment is handled by Vercel's GitHub integration — not by this workflow (D-045)
on:
  push:
    paths:
      - 'apps/web/**'
  pull_request:
    paths:
      - 'apps/web/**'

jobs:
  # ── Dependency Review ────────────────────────────────────────────────────────
  # Blocks PRs that introduce packages with known CVEs (A06)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout v4.3.1 — https://github.com/actions/checkout/releases/tag/v4.3.1
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # actions/dependency-review-action v4.9.0 — https://github.com/actions/dependency-review-action/releases/tag/v4.9.0

  # ── CI ──────────────────────────────────────────────────────────────────────
  # Runs on every push and pull_request that touches apps/web/**
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout v4.3.1 — https://github.com/actions/checkout/releases/tag/v4.3.1

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # actions/setup-node v4.4.0 — https://github.com/actions/setup-node/releases/tag/v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Audit dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high --production

      - name: Type check
        working-directory: apps/web
        run: npm run type-check

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Test
        working-directory: apps/web
        run: npm test

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          # Placeholder so Vite build resolves the env var reference
          VITE_API_BASE_URL: 'https://placeholder.for.build.check'
