name: Frontend CI
# TODO(security): pin all 'uses:' steps to commit SHA digests before first production deploy.
#   Replace tag-based refs (e.g. @v4) with SHA-based refs (e.g. @<40-char SHA>  # v4.x.x).
#   Use 'pin-github-actions' CLI or enable Dependabot for the github-actions ecosystem.

# Triggered only when frontend files change (D-048)
# Deployment is handled by Vercel's GitHub integration — not by this workflow (D-045)
on:
  push:
    paths:
      - 'apps/web/**'
  pull_request:
    paths:
      - 'apps/web/**'

jobs:
  # ── Dependency Review ────────────────────────────────────────────────────────
  # Blocks PRs that introduce packages with known CVEs (A06)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  # ── CI ──────────────────────────────────────────────────────────────────────
  # Runs on every push and pull_request that touches apps/web/**
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Audit dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high --production

      - name: Type check
        working-directory: apps/web
        run: npm run type-check

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Test
        working-directory: apps/web
        run: npm test

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          # Placeholder so Vite build resolves the env var reference
          VITE_API_BASE_URL: 'https://placeholder.for.build.check'
