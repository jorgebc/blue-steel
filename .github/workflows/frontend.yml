name: Frontend CI

# Triggered only when frontend files change (D-048)
# Deployment is handled by Vercel's GitHub integration — not by this workflow (D-045)
on:
  push:
    paths:
      - 'apps/web/**'
  pull_request:
    paths:
      - 'apps/web/**'

jobs:
  # ── Dependency Review ────────────────────────────────────────────────────────
  # Blocks PRs that introduce packages with known CVEs (A06)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout v6.0.2 — https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # actions/dependency-review-action v4.9.0 — https://github.com/actions/dependency-review-action/releases/tag/v4.9.0
        # NOTE: v4.9.0 is the latest release and still runs on Node.js 20. The upstream project
        # has not yet shipped a Node.js 24-compatible release. A deprecation warning will appear
        # until they do. Track: https://github.com/actions/dependency-review-action/releases

  # ── CI ──────────────────────────────────────────────────────────────────────
  # Runs on every push and pull_request that touches apps/web/**
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout v6.0.2 — https://github.com/actions/checkout/releases/tag/v6.0.2

      - name: Set up Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # actions/setup-node v6.3.0 — https://github.com/actions/setup-node/releases/tag/v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Audit dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high --production

      - name: Type check
        working-directory: apps/web
        run: npm run type-check

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Test
        working-directory: apps/web
        run: npm test

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          # Placeholder so Vite build resolves the env var reference
          VITE_API_BASE_URL: 'https://placeholder.for.build.check'
