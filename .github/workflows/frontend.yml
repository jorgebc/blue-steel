name: Frontend CI

# Triggered only when frontend files change (D-048)
# Deployment is handled by Vercel's GitHub integration — not by this workflow (D-045)
on:
  push:
    paths:
      - 'apps/web/**'
  pull_request:
    paths:
      - 'apps/web/**'

jobs:
  # ── Dependency Review ────────────────────────────────────────────────────────
  # Blocks PRs that introduce packages with known CVEs (A06)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # actions/checkout v6.0.3 — https://github.com/actions/checkout/releases/tag/v6.0.3
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # actions/dependency-review-action v5.0.0 — https://github.com/actions/dependency-review-action/releases/tag/v5.0.0
        # NOTE: v4.9.0 is the latest release and still runs on Node.js 20. The upstream project
        # has not yet shipped a Node.js 24-compatible release. A deprecation warning will appear
        # until they do. Track: https://github.com/actions/dependency-review-action/releases

  # ── CI ──────────────────────────────────────────────────────────────────────
  # Runs on every push and pull_request that touches apps/web/**
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # actions/checkout v6.0.3 — https://github.com/actions/checkout/releases/tag/v6.0.3

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # actions/setup-node v6.4.0 — https://github.com/actions/setup-node/releases/tag/v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Audit dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high --production

      - name: Type check
        working-directory: apps/web
        run: npm run type-check

      - name: Format check
        working-directory: apps/web
        run: npx prettier --check src/

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Test
        working-directory: apps/web
        run: npm test

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          # Placeholder so Vite build resolves the env var reference
          VITE_API_BASE_URL: 'https://placeholder.for.build.check'
