name: Frontend CI

# Triggered only when frontend files change (D-048)
# Deployment is handled by Vercel's GitHub integration — not by this workflow (D-045)
on:
  push:
    paths:
      - 'apps/web/**'
  pull_request:
    paths:
      - 'apps/web/**'

jobs:
  # ── CI ──────────────────────────────────────────────────────────────────────
  # Runs on every push and pull_request that touches apps/web/**
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Type check
        working-directory: apps/web
        run: npm run type-check

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Test
        working-directory: apps/web
        run: npm test

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          # Placeholder so Vite build resolves the env var reference
          VITE_API_BASE_URL: 'https://placeholder.for.build.check'
