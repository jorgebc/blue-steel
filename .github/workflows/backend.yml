name: Backend CI/CD

# Triggered only when backend files change (D-048)
on:
  push:
    paths:
      - 'apps/api/**'
  pull_request:
    paths:
      - 'apps/api/**'

jobs:
  # ── Dependency Review ────────────────────────────────────────────────────────
  # Blocks PRs that introduce packages with known CVEs (A06)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout v4.3.1 — https://github.com/actions/checkout/releases/tag/v4.3.1
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # actions/dependency-review-action v4.9.0 — https://github.com/actions/dependency-review-action/releases/tag/v4.9.0

  # ── Test ────────────────────────────────────────────────────────────────────
  # Runs on every push and pull_request that touches apps/api/**
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout v4.3.1 — https://github.com/actions/checkout/releases/tag/v4.3.1

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # actions/setup-java v4.8.0 — https://github.com/actions/setup-java/releases/tag/v4.8.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Spotless check (google-java-format, D-071)
        working-directory: apps/api
        run: mvn spotless:check

      - name: Compile
        working-directory: apps/api
        run: mvn compile -DskipTests

      - name: Unit tests + ArchUnit (D-037)
        working-directory: apps/api
        run: mvn test

      - name: Integration tests (Testcontainers, D-056)
        working-directory: apps/api
        run: mvn verify

      - name: Mutation tests — domain core (PITest, D-036)
        working-directory: apps/api
        run: mvn test-compile pitest:mutationCoverage

  # ── Build + Deploy ───────────────────────────────────────────────────────────
  # Runs only on push to main (not on pull_request)
  build-and-deploy:
    name: Build and Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout v4.3.1 — https://github.com/actions/checkout/releases/tag/v4.3.1

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # actions/setup-java v4.8.0 — https://github.com/actions/setup-java/releases/tag/v4.8.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        working-directory: apps/api
        run: mvn package -DskipTests -Dspring-boot.repackage.skip=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # docker/setup-buildx-action v3.12.0 — https://github.com/docker/setup-buildx-action/releases/tag/v3.12.0
        # linux/arm64 required — Oracle Cloud Always Free ARM VM (D-046)

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # docker/login-action v3.7.0 — https://github.com/docker/login-action/releases/tag/v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (linux/arm64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # docker/build-push-action v6.19.2 — https://github.com/docker/build-push-action/releases/tag/v6.19.2
        with:
          context: apps/api
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest

      - name: Deploy to Oracle VM
        # TODO: Wire secrets before first production deploy (Phase 1 gate D-057)
        # Required GitHub secrets: ORACLE_SSH_KEY, ORACLE_VM_HOST, ORACLE_VM_USER
        # Commands: SSH into VM, docker pull, docker stop blue-steel-api, docker run
        run: echo "Deploy step stubbed — secrets not yet provisioned"
