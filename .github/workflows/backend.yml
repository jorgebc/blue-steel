name: Backend CI/CD

# Triggered only when backend files change (D-048)
on:
  push:
    paths:
      - 'apps/api/**'
  pull_request:
    paths:
      - 'apps/api/**'

jobs:
  # ── Dependency Review ────────────────────────────────────────────────────────
  # Blocks PRs that introduce packages with known CVEs (A06)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # actions/checkout v7.0.0 — https://github.com/actions/checkout/releases/tag/v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # actions/dependency-review-action v5.0.0 — https://github.com/actions/dependency-review-action/releases/tag/v5.0.0
        # NOTE: v4.9.0 is the latest release and still runs on Node.js 20. The upstream project
        # has not yet shipped a Node.js 24-compatible release. A deprecation warning will appear
        # until they do. Track: https://github.com/actions/dependency-review-action/releases

  # ── Test ────────────────────────────────────────────────────────────────────
  # Runs on every push and pull_request that touches apps/api/**
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # actions/checkout v7.0.0 — https://github.com/actions/checkout/releases/tag/v7.0.0

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # actions/setup-java v5.3.0 — https://github.com/actions/setup-java/releases/tag/v5.3.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Spotless check (google-java-format, D-071)
        working-directory: apps/api
        run: mvn spotless:check

      - name: Compile
        working-directory: apps/api
        run: mvn compile -DskipTests

      - name: Unit tests + ArchUnit (D-037)
        working-directory: apps/api
        run: mvn test

      - name: Integration tests (Testcontainers, D-056)
        working-directory: apps/api
        run: mvn verify

      - name: Mutation tests — domain core (PITest, D-036)
        working-directory: apps/api
        run: mvn test-compile pitest:mutationCoverage

  # ── Build + Deploy ───────────────────────────────────────────────────────────
  # Runs only on push to main (not on pull_request)
  build-and-deploy:
    name: Build and Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # actions/checkout v7.0.0 — https://github.com/actions/checkout/releases/tag/v7.0.0

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # actions/setup-java v5.3.0 — https://github.com/actions/setup-java/releases/tag/v5.3.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        working-directory: apps/api
        run: mvn package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # docker/setup-buildx-action v4.1.0 — https://github.com/docker/setup-buildx-action/releases/tag/v4.1.0
        # linux/amd64 — Render free tier web service (D-091)

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # docker/login-action v4.2.0 — https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (linux/amd64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # docker/build-push-action v7.2.0 — https://github.com/docker/build-push-action/releases/tag/v7.2.0
        with:
          context: apps/api
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest

      - name: Deploy to Render
        # Required GitHub secret: RENDER_DEPLOY_HOOK_URL (D-091, D-092)
        # Obtain from: Render dashboard → Service → Settings → Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -f -X POST "$RENDER_DEPLOY_HOOK_URL"

  # ── Smoke Test ───────────────────────────────────────────────────────────────
  # Polls GET /api/v1/health after deploy. Up to 15 attempts × 20 s = 5 min.
  # Render needs extra time: image pull + JVM cold start on new deploy.
  # Required secret: RENDER_SERVICE_URL — full base URL, e.g. https://blue-steel-api.onrender.com
  smoke-test:
    name: Smoke Test
    needs: build-and-deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Wait for application to become healthy
        env:
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          HEALTH_URL="${RENDER_SERVICE_URL}/api/v1/health"
          MAX_ATTEMPTS=15
          WAIT_SECONDS=20

          echo "Polling ${HEALTH_URL} (max ${MAX_ATTEMPTS} attempts, ${WAIT_SECONDS}s between retries)"

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt ${attempt}/${MAX_ATTEMPTS}..."
            HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
                               --max-time 10 --connect-timeout 5 \
                               "${HEALTH_URL}" || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✓ Health check passed (HTTP ${HTTP_STATUS}) on attempt ${attempt}"
              exit 0
            fi

            echo "✗ Got HTTP ${HTTP_STATUS} — waiting ${WAIT_SECONDS}s before retry"
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              sleep $WAIT_SECONDS
            fi
          done

          echo ""
          echo "ERROR: deployment is not healthy after ${MAX_ATTEMPTS} attempts ($(( MAX_ATTEMPTS * WAIT_SECONDS ))s)"
          echo "Last status: HTTP ${HTTP_STATUS}"
          echo "Check logs in the Render dashboard: Service → Logs"
          exit 1
