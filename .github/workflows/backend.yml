name: Backend CI/CD

# Triggered only when backend files change (D-048)
on:
  push:
    paths:
      - 'apps/api/**'
  pull_request:
    paths:
      - 'apps/api/**'

jobs:
  # ── Dependency Review ────────────────────────────────────────────────────────
  # Blocks PRs that introduce packages with known CVEs (A06)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout v6.0.2 — https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # actions/dependency-review-action v4.9.0 — https://github.com/actions/dependency-review-action/releases/tag/v4.9.0
        # NOTE: v4.9.0 is the latest release and still runs on Node.js 20. The upstream project
        # has not yet shipped a Node.js 24-compatible release. A deprecation warning will appear
        # until they do. Track: https://github.com/actions/dependency-review-action/releases

  # ── Test ────────────────────────────────────────────────────────────────────
  # Runs on every push and pull_request that touches apps/api/**
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout v6.0.2 — https://github.com/actions/checkout/releases/tag/v6.0.2

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # actions/setup-java v5.2.0 — https://github.com/actions/setup-java/releases/tag/v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Spotless check (google-java-format, D-071)
        working-directory: apps/api
        run: mvn spotless:check

      - name: Compile
        working-directory: apps/api
        run: mvn compile -DskipTests

      - name: Unit tests + ArchUnit (D-037)
        working-directory: apps/api
        run: mvn test

      - name: Integration tests (Testcontainers, D-056)
        working-directory: apps/api
        run: mvn verify

      - name: Mutation tests — domain core (PITest, D-036)
        working-directory: apps/api
        run: mvn test-compile pitest:mutationCoverage

  # ── Build + Deploy ───────────────────────────────────────────────────────────
  # Runs only on push to main (not on pull_request)
  build-and-deploy:
    name: Build and Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout v6.0.2 — https://github.com/actions/checkout/releases/tag/v6.0.2

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # actions/setup-java v5.2.0 — https://github.com/actions/setup-java/releases/tag/v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        working-directory: apps/api
        run: mvn package -DskipTests -Dspring-boot.repackage.skip=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # docker/setup-buildx-action v4.0.0 — https://github.com/docker/setup-buildx-action/releases/tag/v4.0.0
        # linux/arm64 required — Oracle Cloud Always Free ARM VM (D-046)

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # docker/login-action v4.1.0 — https://github.com/docker/login-action/releases/tag/v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (linux/arm64)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # docker/build-push-action v7.1.0 — https://github.com/docker/build-push-action/releases/tag/v7.1.0
        with:
          context: apps/api
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest

      - name: Deploy to Oracle VM
        # TODO: Wire secrets before first production deploy (Phase 1 gate D-057)
        # Required GitHub secrets: ORACLE_SSH_KEY, ORACLE_VM_HOST, ORACLE_VM_USER
        # Commands: SSH into VM, docker pull, docker stop blue-steel-api, docker run
        run: echo "Deploy step stubbed — secrets not yet provisioned"
